    <title>Contact</title>
    <style>
        body{
            background-color:black;
            color:white;
            font-family:"Sora";
        }

        input,textarea,button{
            font-family:inherit;
        }

        input{
            background-color:inherit;
            border:none;
            border-bottom:1px solid rgb(121, 121, 121);
            padding-bottom:7px;
            padding-top:10px;
            width:20vw;
            font-size:20px;
            margin:10px 0px;
            color:white;
        }
        form{
            padding-top:20px;
        }

        form button{
            width:20vw;
            padding:10px;
            background-color:rgb(121, 121, 121);
        }
        nav{
            display:flex;
            gap:200px;
            padding: 35px  0px;
            align-items:center;
        }

    nav img{
        bottom:20px;
    }

    .links{
        display:flex;
        gap:60px;
        padding-top:40px;
        border-radius: 14px;
        text-align: center;
        font-size:28px;
        color: white;
        font-weight: bold;
        padding-left: 250px;

    }

    nav a{
        text-decoration:none;
        color:white;
        font-weight:500;
    }

    .intro_text h1{
        font-size:60px;
        font-weight:400;
    }
    .parent_container{
        display:flex;
        padding-left:220px;
        gap:300px;
    }

    .right_content p{
        font-size:25px;
    }
    .right_content h1{
        font-size:60px;
        font-weight:400;
    }

            <form method="get" action="#">

            <input type="email" id="email" name="email_address" placeholder="Email"><br>
            <input type="text" id="message" name="message" placeholder="Message"><br>
            <button type="submit">Send</button>
        </form>
        </div>
