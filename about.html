<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driveway — About Us</title>
    <link rel="stylesheet" href="website.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="home.html" class="nav-logo">
            <img src="pictures/logo.png" alt="Driveway">
            <span>DRIVEWAY</span>
        </a>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="inventory.html">Inventory</a>
            <a href="contact.html">Contact</a>
            <a href="account.html">Account</a>
        </div>
    </nav>

    <!-- Services -->
    <div class="services-section">
        <h1>Our Services</h1>
        <div class="services-container">
            <div class="service-card">
                <i class="fa-solid fa-car"></i>
                <span>Car Sales</span>
            </div>
            <div class="service-card">
                <i class="fa-solid fa-arrows-rotate"></i>
                <span>Trade-In</span>
            </div>
            <div class="service-card">
                <i class="fa-solid fa-credit-card"></i>
                <span>Financing</span>
            </div>
            <div class="service-card">
                <i class="fa-solid fa-file-lines"></i>
                <span>Documentation</span>
            </div>
            <div class="service-card">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span>Inspection</span>
            </div>
            <div class="service-card">
                <i class="fa-solid fa-truck"></i>
                <span>Delivery</span>
            </div>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats-section">
        <div class="stat-item">
            <img src="pictures/car.svg" alt="Cars sold">
            <p>700+<br>Cars sold</p>
        </div>
        <div class="stat-item">
            <img src="pictures/users.svg" alt="Happy clients">
            <p>1,000+<br>Happy clients</p>
        </div>
        <div class="stat-item">
            <img src="pictures/location.svg" alt="Locations">
            <p>3+<br>Locations</p>
        </div>
        <div class="stat-item">
            <img src="pictures/time.svg" alt="Years of experience">
            <p>4+<br>Years of experience</p>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <span class="footer-brand">DRIVEWAY</span>
        <span class="footer-copy">&copy; 2026 Driveway. All rights reserved.</span>
        <div class="footer-social">
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
        </div>
    </footer>

</body>
</html>
