    <style>
  body {
    margin: 0;
    font-family: 'Share Tech', sans-serif;
    background-color: #111;
    color: black;
  }

  .services-section {
    text-align: center;
    padding: 80px 20px;
  }

  .services-section h1 {
    font-size: 48px;
    font-weight: bold;
    margin-bottom: 40px;
    color: #fff;
    border-bottom: 3px solid skyblue;
    display: inline-block;
    padding-bottom: 10px;
  }

  .services-container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 30px;
    margin-top: 40px;
  }

  .service-card {
    background-color: #222;
    width: 180px;
    height: 180px;
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: transform 0.3s, box-shadow 0.3s;
    cursor: pointer;
    padding: 20px;
    background-color: skyblue;
  }

  .service-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 10px white, 0 0 20px #00ffff;
  }

  .service-card i {
    font-size: 48px;
    margin-bottom: 15px;
  }

  .service-card span {
    font-size: 20px;
    font-weight: bold;
  }

</style>
</head>
<body>
    <div>
        <div class="all-navbars">
            <nav>
            <a href="home.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="inventory.html">Inventory</a>
            <a href="contact.html">Contact</a>
            <a href="account.html">Account</a>       
            </nav>     
        </div>
        <div class="services-section">
  <h1>Our Services</h1>
  <div class="services-container">
    <div class="service-card">
      <i class="fa-solid fa-car"></i>
      <span>Car Sales</span>
    </div>
    <div class="service-card">
      <i class="fa-solid fa-arrows-rotate"></i>
      <span>Trade-In</span>
    </div>
    <div class="service-card">
      <i class="fa-solid fa-credit-card"></i>
      <span>Financing</span>
    </div>
    <div class="service-card">
      <i class="fa-solid fa-file-lines"></i>
      <span>Documentation</span>
    </div>
    <div class="service-card">
      <i class="fa-solid fa-magnifying-glass"></i>
      <span>Inspection</span>
    </div>
    <div class="service-card">
      <i class="fa-solid fa-truck"></i>
      <span>Delivery</span>
    </div>
  </div>
</div>

        <div class="info">
            <div class="about-us-boxes">
                <div id="cars-sold-box">
                    <img src="pictures/car.svg" alt="cars sold">
                    <p>700+ <br>Cars sold</p>
                </div>
                <div id="happy-clients-box">
                    <img src="pictures/users.svg" alt="happy clients">
                    <p>1,000+ <br>Happy clients</p>
                </div>
                <div id="locations-box">
                    <img src="pictures/location.svg" alt="Locations">
                    <p>3+ <br>Locations</p>
                </div>
                <div id="years-experience-box">
                    <img src="pictures/time.svg" alt="Years of experience">
                    <p>4+ <br>Years of experience</p>
                </div>
            </div>
        </div>
    </div>
