<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driveway — Account</title>
    <link rel="stylesheet" href="website.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="home.html" class="nav-logo">
            <img src="pictures/logo.png" alt="Driveway">
            <span>DRIVEWAY</span>
        </a>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="inventory.html">Inventory</a>
            <a href="contact.html">Contact</a>
            <a href="account.html">Account</a>
        </div>
    </nav>

    <!-- Account section -->
    <div class="account-section">

        <!-- Left: image -->
        <div class="account-image">
            <img src="pictures/P90442352_highRes_rolls-royce-announce(1).jpg" alt="Luxury Car">
        </div>

        <!-- Right: form -->
        <div class="account-form-wrap">
            <h2>SIGN UP</h2>
            <p>Create your Driveway account to get started.</p>
            <form class="account-form" action="#" method="post">
                <label for="fname">Name</label>
                <input type="text" id="fname" name="fullname" placeholder="Full name">

                <label for="telephone">Phone</label>
                <input type="tel" id="telephone" name="phone" placeholder="+250">

                <label for="account">Account Type</label>
                <input type="text" id="account" name="account" placeholder="Individual / Dealer">

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Password">

                <button type="submit">Create Account</button>
            </form>
        </div>

    </div>

</body>
</html>
