<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driveway — Find Your Dream Car</title>
    <link rel="stylesheet" href="website.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .rain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 999;
        }
        .drop {
            position: absolute;
            top: -20px;
            width: 2px;
            height: 20px;
            background: rgba(174, 194, 224, 0.5);
            animation: fall linear infinite;
            border-radius: 50%;
            left: calc(100% * var(--x));
            animation-duration: calc(0.6s + var(--speed));
            opacity: var(--opacity);
        }
        .drop:nth-child(1)  { --x: 0.05; --speed: 0.2s; --opacity: 0.4; }
        .drop:nth-child(2)  { --x: 0.15; --speed: 0.6s; --opacity: 0.6; }
        .drop:nth-child(3)  { --x: 0.25; --speed: 0.3s; --opacity: 0.5; }
        .drop:nth-child(4)  { --x: 0.35; --speed: 0.9s; --opacity: 0.7; }
        .drop:nth-child(5)  { --x: 0.45; --speed: 0.4s; --opacity: 0.5; }
        .drop:nth-child(6)  { --x: 0.55; --speed: 0.8s; --opacity: 0.6; }
        .drop:nth-child(7)  { --x: 0.65; --speed: 0.5s; --opacity: 0.4; }
        .drop:nth-child(8)  { --x: 0.75; --speed: 0.7s; --opacity: 0.6; }
        .drop:nth-child(9)  { --x: 0.85; --speed: 0.3s; --opacity: 0.5; }
        .drop:nth-child(10) { --x: 0.95; --speed: 1.0s; --opacity: 0.7; }
        @keyframes fall {
            0%   { transform: translateY(-20px); }
            100% { transform: translateY(100vh); }
        }
    </style>
</head>
<body>

    <!-- Rain effect -->
    <div class="rain">
        <span class="drop"></span>
        <span class="drop"></span>
        <span class="drop"></span>
        <span class="drop"></span>
        <span class="drop"></span>
        <span class="drop"></span>
        <span class="drop"></span>
        <span class="drop"></span>
        <span class="drop"></span>
        <span class="drop"></span>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="home.html" class="nav-logo">
            <img src="pictures/logo.png" alt="Driveway">
            <span>DRIVEWAY</span>
        </a>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="inventory.html">Inventory</a>
            <a href="contact.html">Contact</a>
            <a href="account.html">Account</a>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-text">
            <h1>Driveway</h1>
            <h2>Find Your Dream Car Today</h2>
            <a href="inventory.html" class="hero-btn">Explore Inventory</a>
        </div>
        <img class="hero-img" src="pictures/car.jpg" alt="Luxury Car">
    </section>

    <!-- Footer -->
    <footer>
        <span class="footer-brand">DRIVEWAY</span>
        <span class="footer-copy">&copy; 2026 Driveway. All rights reserved.</span>
        <div class="footer-social">
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
        </div>
    </footer>

</body>
</html>
